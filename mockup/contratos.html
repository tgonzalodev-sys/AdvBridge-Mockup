<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contratos — ACB</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 font-sans" x-data="contratosApp()">
<aside class="fixed inset-y-0 left-0 w-56 bg-slate-900 flex flex-col z-40">
  <div class="px-5 py-5 border-b border-slate-700"><div class="text-white font-bold text-base">AdvertMind</div><div class="text-slate-400 text-xs mt-0.5">Commercial Bridge</div></div>
  <nav class="flex-1 px-3 py-4 space-y-1">
    <a href="clientes.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Clientes</a>
    <a href="productos.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>Productos</a>
    <a href="contratos.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-blue-600 text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Contratos</a>
    <a href="facturacion.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>Facturación</a>
  </nav>
  <div class="px-4 py-4 border-t border-slate-700"><div class="text-xs text-slate-500 mb-1">Subsidiaria activa</div><select class="w-full bg-slate-800 text-slate-200 text-xs border border-slate-700 rounded px-2 py-1.5"><option>Advertmind SA</option><option>EuroAdvertmind SL</option></select></div>
</aside>

<div class="ml-56 min-h-screen">
  <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-30">
    <div>
      <h1 class="text-xl font-semibold text-gray-900">Contratos</h1>
      <p class="text-sm text-gray-500 mt-0.5">Advertmind SA · Vigentes y futuros</p>
    </div>
    <a href="contrato-nuevo.html" class="inline-flex items-center gap-2 bg-blue-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-blue-700">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Nuevo contrato
    </a>
  </header>

  <main class="px-8 py-6">
    <!-- Filters -->
    <div class="bg-white rounded-xl border border-gray-200 p-4 mb-5 flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-48">
        <label class="block text-xs font-medium text-gray-600 mb-1">Buscar</label>
        <input x-model="search" type="text" placeholder="Etiqueta, cliente…" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="min-w-32">
        <label class="block text-xs font-medium text-gray-600 mb-1">Ciclo de vida</label>
        <select x-model="filterLC" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Todos</option>
          <option>Activo</option><option>Futuro</option><option>Expirado</option>
        </select>
      </div>
      <div>
        <!-- History toggle -->
        <label class="block text-xs font-medium text-gray-600 mb-1">Historial</label>
        <button @click="showHistory = !showHistory"
          class="flex items-center gap-2 px-3 py-2 border rounded-lg text-sm transition-colors"
          :class="showHistory ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-300 text-gray-600 hover:bg-gray-50'">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span x-text="showHistory ? 'Con historial' : 'Solo vigentes'"></span>
        </button>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-200 bg-gray-50">
            <th class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wide px-5 py-3">Etiqueta</th>
            <th class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wide px-4 py-3">Madre</th>
            <th class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wide px-4 py-3">Grupo</th>
            <th class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wide px-4 py-3">Inicio</th>
            <th class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wide px-4 py-3">Fin</th>
            <th class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wide px-4 py-3">Auto-renov.</th>
            <th class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wide px-4 py-3">Líneas</th>
            <th class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wide px-4 py-3">Estado</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="c in filteredContratos()" :key="c.id">
            <tr class="border-b border-gray-100 hover:bg-gray-50" :class="c.lifecycle === 'Expirado' ? 'opacity-60' : ''">
              <td class="px-5 py-3">
                <div class="font-medium text-gray-900" x-text="c.etiqueta"></div>
                <template x-if="c.reemplazadoPor">
                  <div class="text-xs text-gray-400 mt-0.5">Reemplazado → <span x-text="c.reemplazadoPor"></span></div>
                </template>
                <template x-if="c.reemplazaA">
                  <div class="text-xs text-blue-500 mt-0.5">Reemplaza a <span x-text="c.reemplazaA"></span></div>
                </template>
              </td>
              <td class="px-4 py-3 text-gray-800" x-text="c.madre"></td>
              <td class="px-4 py-3 text-gray-500 text-xs" x-text="c.grupo || '—'"></td>
              <td class="px-4 py-3 text-gray-600" x-text="c.inicio"></td>
              <td class="px-4 py-3 text-gray-600">
                <span x-text="c.fin || '—'"></span>
                <template x-if="c.autoRenov && c.fin">
                  <span class="ml-1 text-xs text-blue-400" title="Auto-renovación activa">↺</span>
                </template>
              </td>
              <td class="px-4 py-3 text-center">
                <template x-if="c.autoRenov">
                  <svg class="w-4 h-4 text-blue-400 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </template>
                <template x-if="!c.autoRenov"><span class="text-gray-300">—</span></template>
              </td>
              <td class="px-4 py-3 text-gray-700" x-text="c.lineas"></td>
              <td class="px-4 py-3">
                <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                  :class="{
                    'bg-green-50 text-green-700': c.lifecycle === 'Activo',
                    'bg-blue-50 text-blue-700': c.lifecycle === 'Futuro',
                    'bg-gray-100 text-gray-500': c.lifecycle === 'Expirado'
                  }" x-text="c.lifecycle"></span>
              </td>
              <td class="px-4 py-3">
                <a href="contrato-detalle.html" class="text-blue-600 hover:text-blue-800 text-xs font-medium">Ver →</a>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <div class="px-5 py-3 border-t border-gray-100 bg-gray-50 text-xs text-gray-500 flex justify-between">
        <span x-text="filteredContratos().length + ' contratos'"></span>
        <span x-show="!showHistory" class="text-gray-400">Mostrando solo vigentes y futuros · <button @click="showHistory=true" class="text-blue-500 hover:underline">Ver historial completo</button></span>
      </div>
    </div>
  </main>
</div>

<style>[x-cloak]{display:none!important}</style>
<script>
function contratosApp() {
  return {
    search: '', filterLC: '', showHistory: false,
    contratos: [
      { id:1, etiqueta:'SkyOne Pro 2024', madre:'Agencia Alcázar', grupo:'Grupo Éxito', inicio:'01/01/2024', fin:'31/12/2025', autoRenov:true,  lineas:2, lifecycle:'Activo',   reemplazaA:null, reemplazadoPor:null },
      { id:2, etiqueta:'Analytics Bernal', madre:'Publicidad Bernal', grupo:'Holding Norte', inicio:'01/03/2024', fin:'28/02/2025', autoRenov:false, lineas:1, lifecycle:'Expirado', reemplazaA:null, reemplazadoPor:'Analytics Bernal v2' },
      { id:3, etiqueta:'Analytics Bernal v2', madre:'Publicidad Bernal', grupo:'Holding Norte', inicio:'01/03/2025', fin:'28/02/2026', autoRenov:true,  lineas:1, lifecycle:'Activo',   reemplazaA:'Analytics Bernal', reemplazadoPor:null },
      { id:4, etiqueta:'SkyOne Starter Valle', madre:'Agencia del Valle', grupo:null, inicio:'01/06/2025', fin:'31/05/2026', autoRenov:false, lineas:1, lifecycle:'Activo',   reemplazaA:null, reemplazadoPor:null },
      { id:5, etiqueta:'Briff Creator Norte Q1-2026', madre:'Grupo Creativo Norte', grupo:'Holding Norte', inicio:'01/01/2026', fin:'31/12/2026', autoRenov:false, lineas:2, lifecycle:'Futuro',   reemplazaA:null, reemplazadoPor:null },
      { id:6, etiqueta:'SkyOne Pro Alcázar 2022', madre:'Agencia Alcázar', grupo:'Grupo Éxito', inicio:'01/01/2022', fin:'31/12/2023', autoRenov:false, lineas:1, lifecycle:'Expirado', reemplazaA:null, reemplazadoPor:'SkyOne Pro 2024' },
    ],
    filteredContratos() {
      return this.contratos.filter(c => {
        if (!this.showHistory && c.lifecycle === 'Expirado') return false;
        const q = this.search.toLowerCase();
        const ms = !q || c.etiqueta.toLowerCase().includes(q) || c.madre.toLowerCase().includes(q);
        const ml = !this.filterLC || c.lifecycle === this.filterLC;
        return ms && ml;
      });
    }
  }
}
</script>
</body>
</html>
